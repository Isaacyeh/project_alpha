<!DOCTYPE html>
<html>
  <head>
    <title>Web Doom-like</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <span>
      <div id="menu-button" onmouseover="rotate()" onmouseout="unrotate()">
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
        <div class="bars"></div>
      </div>
      <div class="title">
        <h1>PROJECT ALPHA</h1>
      </div>

      <div id="menu" class="menu hidden">
        <ul>
          <li><a href="#">Jeffery Epstein</a></li>
          <li><a href="#">Donald Trump</a></li>
          <li><a href="#">Kim Jong Un</a></li>
          <li><a href="#">Benjamin Netanyahu</a></li>
        </ul>
      </div>
    </span>

    <script src="UI/menu.js"></script>

    <canvas id="game" width="800" height="500"></canvas>

    <div id="spriteMenu" class="sprite-menu hidden">
      <!-- Menu content will be populated by JS -->
    </div>

    <div id="chatContainer">
      <div id="chat"></div>
      <input id="chatInput" placeholder="Type message..." />
      <button id="sendBtn">Send</button>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
